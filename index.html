<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AWS Static Website with Animation</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    header {
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 2.5rem;
      color: #38bdf8;
      animation: fadeInDown 2s ease;
    }

    p.lead {
      color: #cbd5e1;
      font-size: 1.1rem;
      animation: fadeIn 3s ease;
    }

    .gallery {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin: 40px auto;
      max-width: 1000px;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      overflow: hidden;
      width: 300px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      animation: float 6s ease-in-out infinite;
    }

    .card h3 {
      margin: 10px 0;
      color: #93c5fd;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      color: #94a3b8;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    @keyframes fadeInDown {
      0% { opacity: 0; transform: translateY(-30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Animated Static Website</h1>
    <p class="lead">Built with AWS S3 — featuring smooth animations and stunning visuals</p>
  </header>

  <section class="gallery">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" alt="Cloud Servers">
      <h3>Cloud Infrastructure</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=80" alt="DevOps Tools">
      <h3>DevOps Tools</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1555949963-aa79dcee981d?auto=format&fit=crop&w=800&q=80" alt="Serverless Functions">
      <h3>Serverless Computing</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1535223289827-42f1e9919769?auto=format&fit=crop&w=800&q=80" alt="Data Analytics">
      <h3>Data Analytics</h3>
    </div>
  </section>

  <footer>
    <p>© 2025 AWS Static Website Demo — Powered by Amazon S3</p>
  </footer>
</body>
</html>
